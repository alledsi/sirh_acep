# Configuration Nginx — SIRH ACEP Pointage
# À installer dans /etc/nginx/sites-available/sirh-acep puis lier :
#   ln -s /etc/nginx/sites-available/sirh-acep /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# IMPORTANT :
#   - real_ip_header X-Forwarded-For est essentiel pour le pointage IP
#   - Activer HTTPS via Let's Encrypt (certbot) ou certificat interne ACEP

server {
    listen 80;
    server_name pointage.acep.local;   # adapter au nom DNS interne

    # Redirection HTTPS (à activer une fois HTTPS configuré)
    # return 301 https://$host$request_uri;

    client_max_body_size 10M;

    # Fichiers statiques (collectés via collectstatic)
    location /static/ {
        alias /opt/sirh_acep/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /opt/sirh_acep/media/;
        expires 7d;
    }

    # Application Django
    location / {
        proxy_pass http://unix:/run/sirh-acep.sock;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;
        proxy_read_timeout 60s;
    }
}

