# Configuration Nginx — SIRH ACEP Pointage
# À installer dans /etc/nginx/sites-available/sirh-acep puis lier :
#   ln -s /etc/nginx/sites-available/sirh-acep /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# CONFIGURATION ACTUELLE :
#   - IP serveur : 192.168.0.209
#   - Port d'écoute : 3636 (port de test)
#   - URL d'accès : http://192.168.0.209:3636
#
# POUR CHANGER LE PORT (3636 → 3535 par exemple) :
#   1. Remplacer `listen 3636` par `listen 3535` ci-dessous
#   2. sudo ufw allow 3535/tcp && sudo ufw delete allow 3636/tcp
#   3. sudo nginx -t && sudo systemctl reload nginx
#
# IMPORTANT :
#   - real_ip_header X-Forwarded-For est essentiel pour le pointage IP
#     (résolution Bureau à partir de l'IP source de l'agent).

server {
    listen 3636 default_server;
    server_name _;   # accepte n'importe quel host (IP du serveur)

    client_max_body_size 10M;

    # Fichiers statiques (collectés via collectstatic)
    location /static/ {
        alias /opt/sirh_acep/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /opt/sirh_acep/media/;
        expires 7d;
    }

    # Application Django (Gunicorn via socket Unix)
    location / {
        proxy_pass http://unix:/run/sirh-acep.sock;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;
        proxy_read_timeout 60s;
    }
}

